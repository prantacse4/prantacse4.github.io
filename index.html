<script>
    var textWrapper = document.querySelector('.ml9 .letters');
textWrapper.innerHTML = textWrapper.textContent.replace(/\S/g, "<span class='letter'>$&</span>");

anime.timeline({loop: true})
  .add({
    targets: '.ml9 .letter',
    scale: [0, 1],
    duration: 1500,
    elasticity: 600,
    delay: (el, i) => 45 * (i+1)
  }).add({
    targets: '.ml9',
    opacity: 0,
    duration: 1000,
    easing: "easeOutExpo",
    delay: 1000
  });
</script>
<script>
    
</script>
<script>
    $(".download-video").hide();
    $(".res").hide();
    var format = null;
    var link = null;
    var mylink = null;
    $('.link').on('input',function(e){
        $(".res").show();
        link = $(".url").val();

    });
    

    $('.top').on('click',function(e){
        $(".top").addClass('active2');
        $(".high").removeClass('active2');
        $(".mid").removeClass('active2');
        $(".mp3").removeClass('active2');
        format = '1080';
        if(link!='' || link!= null){
            mylink = 'https://loader.to/api/button/?url='+link+'&f='+format;
            downloadVideo(mylink);
        }
    });

    $('.high').on('click',function(e){
        $(".top").removeClass('active2');
        $(".high").addClass('active2');
        $(".mid").removeClass('active2');
        $(".mp3").removeClass('active2');
        format = '720';
        if(link!='' || link!= null){
            mylink = 'https://loader.to/api/button/?url='+link+'&f='+format;
            downloadVideo(mylink);
        }
    });

    $('.mid').on('click',function(e){
        $(".top").removeClass('active2');
        $(".high").removeClass('active2');
        $(".mid").addClass('active2');
        $(".mp3").removeClass('active2');
        format = '480';
        if(link!='' || link!= null){
            mylink = 'https://loader.to/api/button/?url='+link+'&f='+format;
            downloadVideo(mylink);
        }
    });
    

    $('.mp3').on('click',function(e){
        $(".top").removeClass('active2');
        $(".high").removeClass('active2');
        $(".mid").removeClass('active2');
        $(".mp3").addClass('active2');
        format = 'mp3'
        if(link!='' || link!= null){
            mylink = 'https://loader.to/api/button/?url='+link+'&f='+format;
            downloadVideo(mylink);
        }
    });
    
    function downloadVideo(mylink){
        $(".download-video").show();
        $(".download-video").html('<iframe style="width:230px;height:60px;border:0;overflow:hidden;" scrolling="no" src="'+mylink+'"></iframe>');
    }
    
</script>
