<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<meta name="Description" content="Enter your description here"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
<link rel="stylesheet" href="./css/background.css">
<link rel="stylesheet" href="./css/style.css">
<title>Downloader</title>
</head>
<body>
    <div class="container">

        <div class="mycontainer">
            <div class="glasscard">
                <div class="cardheader">
                    ইউটিউব থেকে সহজে ভিডিও ডাউনলোড করুন
                </div><hr>
                <div class="myinput">
                    <div class="row text-center">
                        <div class="col-md-3 col-sm-12">
                            <label class="video-label">ভিডিও লিংক দিন Hridoy</label>
                        </div>
                        <div class="col-md-9">
                            <input class="link url" type="text">
                        </div>
                    </div> 
                </div>
                <br><br>
                <div class="res ">
                    <div class=" text-center">
                        <label class="video-label text-center">ফাইল টাইপ সিলেক্ট করুন</label>
                        <div class="row mt-3">
                            <div class=" col-md-3 col-sm-4 ">
                                <button class="btn btn-primary mt-3 neon-button top">1080p ভিডিও</button>
                            </div>
                            <div class=" col-md-3 col-sm-4">
                                <button class="btn btn-primary mt-3 neon-button high">720p ভিডিও</button>
                            </div>
                            <div class=" col-md-3 col-sm-4">
                                <button class="btn btn-primary mt-3 neon-button mid">480p ভিডিও</button>
                            </div>
                            <div class="col-md-3 col-sm-4">
                                <button class="btn btn-primary mt-3 neon-button mp3">MP3 অডিও</button>
                            </div>
                        </div>
                    </div>
                    <br>
                    <div class="download-video text-center"></div>
                </div>
                
            </div>
        </div>

    </div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.1/umd/popper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/js/bootstrap.min.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script> 

<script>
    $(".download-video").hide();
    $(".res").hide();
    var format = null;
    var link = null;
    var mylink = null;
    $('.link').on('input',function(e){
        $(".res").show();
        link = $(".url").val();

    });
    

    $('.top').on('click',function(e){
        $(".top").addClass('active2');
        $(".high").removeClass('active2');
        $(".mid").removeClass('active2');
        $(".mp3").removeClass('active2');
        format = '1080';
        if(link!='' || link!= null){
            mylink = 'https://loader.to/api/button/?url='+link+'&f='+format;
            downloadVideo(mylink);
        }
    });

    $('.high').on('click',function(e){
        $(".top").removeClass('active2');
        $(".high").addClass('active2');
        $(".mid").removeClass('active2');
        $(".mp3").removeClass('active2');
        format = '720';
        if(link!='' || link!= null){
            mylink = 'https://loader.to/api/button/?url='+link+'&f='+format;
            downloadVideo(mylink);
        }
    });

    $('.mid').on('click',function(e){
        $(".top").removeClass('active2');
        $(".high").removeClass('active2');
        $(".mid").addClass('active2');
        $(".mp3").removeClass('active2');
        format = '480';
        if(link!='' || link!= null){
            mylink = 'https://loader.to/api/button/?url='+link+'&f='+format;
            downloadVideo(mylink);
        }
    });
    

    $('.mp3').on('click',function(e){
        $(".top").removeClass('active2');
        $(".high").removeClass('active2');
        $(".mid").removeClass('active2');
        $(".mp3").addClass('active2');
        format = 'mp3'
        if(link!='' || link!= null){
            mylink = 'https://loader.to/api/button/?url='+link+'&f='+format;
            downloadVideo(mylink);
        }
    });
    
    function downloadVideo(mylink){
        $(".download-video").show();
        $(".download-video").html('<iframe style="width:230px;height:60px;border:0;overflow:hidden;" scrolling="no" src="'+mylink+'"></iframe>');
    }
    
</script>
</body>
</html>
