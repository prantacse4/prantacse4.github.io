!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<meta name="Description" content="Enter your description here"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
<title>Downloader</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header bg-primary"><h5 class="text-white text-center">Drop Your Youtube Link</h5></div>
            <form class="myform">
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-control-label mt-3">Link</label>
                        <input type="text"  name="link" class="link form-control" required>
                        <label class="form-control-label mt-3">Select Format</label>
                        <Select class="form-control form-control-select format" required>
                            <option selected value="720">720p Video</option>
                            <option value="360">360p Video</option>
                            <option value="480">480p Video</option>
                            <option value="1080">1080p Video</option>
                            <option value="mp3">MP3 AUDIO</option>

                        </Select>
    
                    </div>
                    
                    <div class="row">
                        <div class="col-lg-6 col-md-12 col-sm-12">
                        <button class="btn btn-primary mt-3">Download</button>
                        <input type="reset" class="btn btn-warning mt-3 ml-2" value="Reset">

                        </div>
                        <div class="col-lg-6 col-md-12 col-sm-12 text-center">
                            <div class="download-video"></div>
                        </div>
                    </div>
                    
                </div>
            </form>
        </div>
    </div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.1/umd/popper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/js/bootstrap.min.js"></script>

<script>
    $(".myform").on('submit',function(e){
        e.preventDefault();
        var link = $(".link").val();
        var format = $(".format").children("option:selected").val();
        var mylink = 'https://loader.to/api/button/?url='+link+'&f='+format;
        downloadVideo(link,format); 
    });
    function downloadVideo(link, format){
        $(".download-video").html('<iframe style="width:230px;height:60px;border:0;overflow:hidden;" scrolling="no" src="https://loader.to/api/button/?url='+link+'&f='+format+'"></iframe>');
    }
    var a = "https://loader.to/api/button/?url=https://www.youtube.com/watch?v=ms2dXQ0gpDA";
</script>
</body>
</html>
